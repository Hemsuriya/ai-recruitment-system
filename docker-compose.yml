version: "3.9"

services:
  # ─── PostgreSQL ─────────────────────────────────────────────
  # Single DB for all app services. n8n gets its own DB (n8n_db).
  postgres:
    image: postgres:17
    container_name: acs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: ${DB_NAME:-ai_candidate_screening}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/migrations/002_seed_data.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - ./scripts/create-n8n-db.sh:/docker-entrypoint-initdb.d/03_n8n_db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7
    container_name: acs_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── n8n ────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: acs_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${DB_USER:-postgres}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-root}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Node Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acs_backend
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── ID Verification (FastAPI) ──────────────────────────────
  id-verification:
    build:
      context: ./ai-services/id-verification
      dockerfile: Dockerfile
    container_name: acs_id_verification
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy

  # ─── Video Analysis (Flask) ─────────────────────────────────
  video-analysis:
    build:
      context: ./ai-services/video-analysis
      dockerfile: Dockerfile
    container_name: acs_video_analysis
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - .env

volumes:
  postgres_data:
  n8n_data:
