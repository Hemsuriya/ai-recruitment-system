version: "3.9"

services:

# ─────────────────────────────────────────────
# PostgreSQL
# ─────────────────────────────────────────────
  postgres:
    image: postgres:17
    container_name: acs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
      POSTGRES_DB: ${DB_NAME:-ai_candidate_screening}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/migrations/002_seed_data.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - ./scripts/create-n8n-db.sh:/docker-entrypoint-initdb.d/03_n8n_db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

# ─────────────────────────────────────────────
# Redis
# ─────────────────────────────────────────────
  redis:
    image: redis:7.2.4
    container_name: acs_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ─────────────────────────────────────────────
# n8n Workflow Engine
# ─────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:1.97.1
    container_name: acs_n8n
    restart: unless-stopped
    ports:
      - "5678:5678"

    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678

      GENERIC_TIMEZONE: Asia/Kolkata
      N8N_SECURE_COOKIE: "false"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"

      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${DB_USER:-postgres}
      DB_POSTGRESDB_PASSWORD: ${DB_PASSWORD:-root}

    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/workflows

    depends_on:
      postgres:
        condition: service_healthy

# ─────────────────────────────────────────────
# Node Backend API
# ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acs_backend
    restart: unless-stopped
    ports:
      - "5000:5000"

    volumes:
      - ./frontend:/app/frontend

    env_file:
      - ./backend/.env

    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      N8N_BASE_URL: http://n8n:5678

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      n8n:
        condition: service_started

# ─────────────────────────────────────────────
# Create Assessment Frontend (React + Vite)
# ─────────────────────────────────────────────
  create-assessment-ui:
    build:
      context: ./frontend/create-assessment
      dockerfile: Dockerfile
    container_name: acs_create_assessment_ui
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/create-assessment/src:/app/src
    depends_on:
      backend:
        condition: service_started

# ─────────────────────────────────────────────
# ID Verification Service (FastAPI)
# ─────────────────────────────────────────────
  id-verification:
    build:
      context: ./ai-services/id-verification
      dockerfile: Dockerfile
    container_name: acs_id_verification
    restart: unless-stopped
    ports:
      - "8000:8000"

    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_ENABLED: "true"
      REDIS_TTL_SECONDS: 3600

    depends_on:
      redis:
        condition: service_healthy

# ─────────────────────────────────────────────
# Video Analysis Service (Flask)
# ─────────────────────────────────────────────
  video-analysis:
    build:
      context: ./ai-services/video-analysis
      dockerfile: Dockerfile
    container_name: acs_video_analysis
    restart: unless-stopped
    ports:
      - "5001:5001"

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  postgres_data:
  n8n_data: